<html>
<body>

<h2>Edit Patient</h2>

<form method="post">
    {% csrf_token %}

    Name:
    <input type="text" name="name" value="{{ patient.name }}">
    <br><br>

    Age:
    <input type="number" name="age" value="{{ patient.age }}">
    <br><br>

    Gender:
    <select name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select>

    <br><br>

    <button type="submit">
        Update Patient
    </button>

</form>

</body>
</html>
