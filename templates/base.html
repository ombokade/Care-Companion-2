<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care Companion 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #edf2fb;
            --bg-soft: rgba(255, 255, 255, 0.88);
            --surface: rgba(255, 255, 255, 0.9);
            --surface-strong: rgba(255, 255, 255, 0.96);
            --glass: rgba(255, 255, 255, 0.35);
            --primary: #4059ff;
            --primary-soft: #dbe3ff;
            --accent: #00c2a0;
            --accent-soft: #d6f5e8;
            --text: #0f172a;
            --muted: #475569;
        }
        * {
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(64, 89, 255, 0.14), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(0, 194, 160, 0.16), transparent 22%),
                        var(--bg);
        }
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .navbar-nav .nav-link {
            color: rgba(255,255,255,.8);
        }
        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(64, 89, 255, 0.98), rgba(0, 194, 160, 0.92));
            border-radius: 2rem;
            color: #fff;
            min-height: 240px;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.28), transparent 35%);
            opacity: .85;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at bottom left, rgba(255,255,255,0.18), transparent 25%);
        }
        .hero-body {
            position: relative;
            z-index: 1;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 1.75rem;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }
        .glass-panel {
            background: var(--surface);
            border-radius: 1.5rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(15, 23, 42, 0.06);
        }
        .section-label {
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .form-control,
        .form-select {
            border-radius: 1.25rem;
            border: 1px solid rgba(15, 23, 42, 0.12);
            background: rgba(255,255,255,0.9);
            padding: 1rem 1rem;
            font-size: 0.95rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4059ff, #00c2a0);
            border: none;
            border-radius: 1.25rem;
            padding: 0.95rem 1.4rem;
            box-shadow: 0 16px 30px rgba(64, 89, 255, 0.18);
        }
        .btn-outline-primary {
            color: #4059ff;
            border-color: rgba(64, 89, 255, 0.35);
            border-radius: 1.25rem;
        }
        .btn-outline-secondary {
            border-color: rgba(107, 114, 128, 0.2);
            border-radius: 1.25rem;
        }
        .badge-pill {
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-size: 0.78rem;
        }
        .list-card {
            border-radius: 1.5rem;
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(15, 23, 42, 0.08);
        }
        .table thead th {
            border-bottom: none;
            color: #1e293b;
            background: transparent;
            font-weight: 700;
        }
        .table tbody tr {
            border-radius: 1.2rem;
            background: #ffffff;
            margin-bottom: 0.85rem;
        }
        .table tbody tr td {
            border-top: none;
        }
        .table-responsive {
            overflow: visible;
        }
        .footer-note {
            color: var(--muted);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container px-4 py-3">
        <a class="navbar-brand" href="{% url 'home' %}">Care Companion</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-3">
                    <span class="nav-link active">Dashboard</span>
                </li>
                <li class="nav-item">
                    <span class="nav-link text-muted">Patient records</span>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container-fluid px-4 py-5">
    {% block content %}{% endblock %}
</div>
<footer class="container-fluid px-4 pb-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center py-3 border-top" style="border-color: rgba(15,23,42,.08);">
        <span class="footer-note">Care Companion • Powered by Django</span>
        <small class="text-muted">Designed for modern healthcare workflows</small>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
